<!-- templates/diary.html -->
{% extends "base.html" %}
{% block title %}Diary{% endblock %}

{% block content %}
<h1>Diary</h1>

<form method="POST" action="{{ url_for('diary') }}" class="diary-form">
    <textarea name="note" placeholder="Write your note here..."></textarea>
    <button type="submit">Save</button>
</form>

<div class="notes-container">
    {% for note in notes %}
    <div class="note-card">
        <p>{{ note[1] }}</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
